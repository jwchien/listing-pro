<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>我的行事曆</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0D0D;--surf:#171717;--surf2:#202020;--bd:#2E2E2E;
  --tx:#E8E8E8;--tx2:#737373;--acc:#A0A0A0;--grn:#6DB86A;--red:#C05A52;--amb:#B89A42;--blue:#5A8FB8;
}
[data-theme="light"]{
  --bg:#F5F5F5;--surf:#FFFFFF;--surf2:#EBEBEB;--bd:#D0D0D0;
  --tx:#111111;--tx2:#666666;--acc:#444444;--grn:#3A9436;--red:#B03A34;--amb:#8A7020;--blue:#2A6A98;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;letter-spacing:-0.01em;}

/* ── Lock Screen ── */
.lock-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;}
.lock-title{font-size:22px;font-weight:600;color:var(--tx);}
.lock-sub{font-size:13px;color:var(--tx2);}
.lock-input{width:100%;max-width:280px;padding:12px 16px;font-size:16px;background:var(--surf);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-family:'Geist',sans-serif;text-align:center;letter-spacing:4px;outline:none;}
.lock-input:focus{border-color:var(--acc);}
.lock-btn{width:100%;max-width:280px;padding:12px;background:var(--acc);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:'Geist',sans-serif;cursor:pointer;}
.lock-btn:hover{opacity:.85;}
.lock-err{font-size:12px;color:var(--red);min-height:18px;}

/* ── App Shell ── */
.app{display:none;flex-direction:column;height:100vh;}
.app.visible{display:flex;}
header{padding:10px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--surf);flex-shrink:0;}
.h-title{font-size:14px;font-weight:600;}
.h-actions{display:flex;gap:8px;align-items:center;}
.h-btn{background:transparent;border:1px solid var(--bd);color:var(--tx2);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:'Geist',sans-serif;}
.h-btn:hover{background:var(--surf2);color:var(--tx);}
#sync-indicator{font-size:12px;min-width:16px;text-align:center;}
.content{flex:1;overflow-y:auto;padding:14px;padding-bottom:80px;}

/* ── Calendar ── */
.cal-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.cal-nav{background:transparent;border:1px solid var(--bd);color:var(--tx);border-radius:6px;padding:4px 12px;cursor:pointer;font-family:'Geist',sans-serif;font-size:13px;}
.cal-nav:hover{background:var(--surf2);}
.cal-month-title{font-size:15px;font-weight:600;flex:1;}
.cal-view-toggle{display:flex;gap:4px;}
.cal-view-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-size:12px;cursor:pointer;font-family:'Geist',sans-serif;}
.cal-view-btn.active{background:var(--acc);color:#fff;border-color:var(--acc);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.cal-dow{background:var(--surf2);padding:5px 4px;font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;text-align:center;}
.cal-cell{background:var(--surf);padding:6px 5px;min-height:64px;cursor:pointer;transition:.1s;position:relative;}
.cal-cell:hover{background:var(--surf2);}
.cal-cell.other-month{opacity:.3;}
.cal-cell.today{background:var(--surf2);box-shadow:inset 2px 0 0 var(--acc);}
.cal-cell.selected{background:var(--surf2);box-shadow:inset 2px 0 0 var(--blue);}
.cal-date{font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:3px;}
.cal-cell.today .cal-date{color:var(--tx);font-weight:700;}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;margin-top:3px;}
.cal-dot{width:6px;height:6px;border-radius:50%;background:var(--bd);}
.cal-dot.done{background:var(--grn);}
.cal-drink-chip{font-size:9px;color:var(--amb);margin-top:2px;}

/* ── Day Panel ── */
.panel-wrap{background:var(--surf);border:1px solid var(--bd);border-radius:12px;padding:0;margin-bottom:14px;overflow:hidden;}
.panel-header{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.panel-date{font-size:14px;font-weight:600;}
.panel-close{background:none;border:none;color:var(--tx2);font-size:18px;cursor:pointer;padding:0 4px;}
.panel-body{padding:14px;}
.panel-label{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 7px;}
.panel-label:first-child{margin-top:0;}

/* Note */
.day-note{width:100%;background:var(--surf2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:10px;font-size:13px;font-family:'Geist',sans-serif;resize:none;outline:none;height:80px;line-height:1.5;}
.day-note:focus{border-color:var(--acc);}

/* Checklist */
.checklist-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.cl-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--bd);cursor:pointer;flex-shrink:0;transition:.15s;}
.cl-check:hover{border-color:var(--acc);}
.cl-check.checked{background:var(--grn);border-color:var(--grn);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 6l3 3 5-5' stroke='white' stroke-width='1.8' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");background-size:cover;}
.cl-text{flex:1;background:transparent;border:none;color:var(--tx);font-size:13px;font-family:'Geist',sans-serif;outline:none;padding:1px 0;}
.cl-text.done-text{text-decoration:line-through;color:var(--tx2);}
.cl-del{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:14px;padding:0 2px;opacity:0;}
.checklist-item:hover .cl-del{opacity:1;}
.cr-tag{font-size:9px;color:var(--amb);white-space:nowrap;flex-shrink:0;}
.add-cl-btn{background:transparent;border:1px dashed var(--bd);color:var(--tx2);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:'Geist',sans-serif;width:100%;margin-top:4px;}
.add-cl-btn:hover{border-color:var(--acc);color:var(--acc);}
.rule-toggle{font-size:11px;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:4px;margin-top:10px;margin-bottom:6px;user-select:none;}
.rule-toggle:hover{color:var(--tx);}

/* Drink tracker */
.drink-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--bd);position:relative;}
.drink-row:last-child{border:none;}
.drink-name{flex:1.5;min-width:0;position:relative;}
.drink-shop{flex:1.2;min-width:0;position:relative;}
.drink-price{width:60px;flex-shrink:0;}
.drink-input{background:transparent;border:none;color:var(--tx);font-size:12px;font-family:'Geist',sans-serif;width:100%;outline:none;padding:2px 0;}
.drink-input::placeholder{color:var(--tx2);opacity:.7;}
.drink-input:focus{border-bottom:1px solid var(--acc);}
.drink-del{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:13px;padding:0 2px;opacity:0;flex-shrink:0;}
.drink-row:hover .drink-del{opacity:1;}
.drink-total{font-size:11px;color:var(--tx2);margin-top:6px;text-align:right;}
.drink-total span{color:var(--amb);font-weight:600;}
.drink-ac-drop{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--surf);border:1px solid var(--bd);border-radius:8px;z-index:300;box-shadow:0 6px 20px rgba(0,0,0,.35);max-height:160px;overflow-y:auto;}
.drink-ac-item{padding:7px 12px;font-size:12px;cursor:pointer;display:flex;flex-direction:column;gap:2px;}
.drink-ac-item:hover{background:var(--surf2);}
.drink-ac-name{color:var(--tx);font-weight:500;}
.drink-ac-sub{font-size:10px;color:var(--tx2);}

/* Recurring manager */
.cr-manager-item{background:var(--surf2);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px;}
.cr-period-label{font-size:10px;color:var(--amb);background:rgba(184,154,66,.15);padding:2px 7px;border-radius:4px;}

/* Week view */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:14px;}
.week-cell{background:var(--surf);border:1px solid var(--bd);border-radius:8px;padding:10px 8px;cursor:pointer;min-height:80px;}
.week-cell:hover{border-color:var(--acc);}
.week-cell.today{border-color:var(--acc);}
.week-cell.selected{border-color:var(--blue);}
.week-dow{font-size:10px;color:var(--tx2);font-weight:600;text-transform:uppercase;}
.week-date{font-size:16px;font-weight:600;margin:2px 0 6px;}
.week-note{font-size:10px;color:var(--tx2);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}

/* Weekend tint */
.weekend-bg{background:#141414;}
[data-theme="light"] .weekend-bg{background:#F0F0F0;}

/* Bottom tab bar */
.tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--surf);border-top:1px solid var(--bd);z-index:100;padding:0 4px;padding-bottom:env(safe-area-inset-bottom);transition:transform .25s ease;}
.tabbar.hidden{transform:translateY(100%);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:transparent;color:var(--tx2);font-family:'Geist',sans-serif;font-size:9px;padding:6px 2px;border-radius:8px;margin:4px 2px;}
.tab.active{color:var(--tx);background:var(--surf2);}
.tab-icon{font-size:18px;line-height:1;}

/* Mobile tweaks */
@media(max-width:768px){
  .cal-cell{min-height:52px;padding:4px 3px;}
  .week-grid{grid-template-columns:1fr;}
  .drink-row{flex-wrap:wrap;}
}
</style>
</head>
<body data-theme="dark">

<!-- Lock Screen -->
<div class="lock-screen" id="lock-screen">
  <div style="font-size:32px">🔒</div>
  <div class="lock-title">我的行事曆</div>
  <div class="lock-sub">請輸入密碼</div>
  <input class="lock-input" id="lock-input" type="password" placeholder="••••••"
    onkeydown="if(event.key==='Enter')tryUnlock()">
  <div class="lock-err" id="lock-err"></div>
  <button class="lock-btn" onclick="tryUnlock()">進入</button>
</div>

<!-- App -->
<div class="app" id="app">
  <header>
    <div class="h-title" id="h-title">行事曆</div>
    <div class="h-actions">
      <span id="sync-indicator" title="同步狀態"></span>
      <button class="h-btn" onclick="toggleTheme()">🌓</button>
    </div>
  </header>
  <div class="content" id="content"></div>
</div>

<!-- Bottom Tab Bar -->
<div class="tabbar" id="tabbar">
  <button class="tab active" id="tab-cal" onclick="setView('cal')">
    <span class="tab-icon">📅</span><span>行事曆</span>
  </button>
  <button class="tab" id="tab-stats" onclick="setView('stats')">
    <span class="tab-icon">🧋</span><span>飲料統計</span>
  </button>
  <button class="tab" id="tab-settings" onclick="setView('settings')">
    <span class="tab-icon">⚙️</span><span>設定</span>
  </button>
</div>

<script>
/* ── Config ── */
const SB_URL='https://omkyoalqeaywwizciizg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ta3lvYWxxZWF5d3dpemNpaXpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NjgyMzgsImV4cCI6MjA5MjM0NDIzOH0.hkzltzyx2jFG509trY_wwUIXlW0I922ZpOS9Q4S4da8';
const SB_HEADERS={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'resolution=merge-duplicates'};
const STORAGE_KEY='cal_v1';
const SUPABASE_ROW='cal_singleton'; // separate from main app's 'singleton'
// ⚠️ 改成你自己想要的密碼
const PASSWORD='199711';

/* ── Lock ── */
function tryUnlock(){
  const val=document.getElementById('lock-input').value;
  if(val===PASSWORD){
    localStorage.setItem('cal_unlocked','1');
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('tabbar').style.display='flex';
    boot();
  } else {
    document.getElementById('lock-err').textContent='密碼錯誤，請再試一次';
    document.getElementById('lock-input').value='';
    document.getElementById('lock-input').focus();
  }
}
document.getElementById('lock-input').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});

/* ── State ── */
const DEFAULT={calendar:{},calRecurring:[],theme:'dark',lastResetDate:null};
let state=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null')||JSON.parse(JSON.stringify(DEFAULT));
let currentView='cal';
let calView='month';
let calDate=new Date();
let calSelected=null;
const DOW=['日','一','二','三','四','五','六'];
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

/* ── Supabase sync ── */
let _syncTimer=null;
function setSyncStatus(s){
  const el=document.getElementById('sync-indicator');if(!el)return;
  const map={saving:['⟳','var(--tx2)'],ok:['✓','var(--grn)'],err:['✕','var(--red)'],offline:['⚡','var(--amb)'],idle:['','']};
  const[icon,color]=map[s]||map.idle;
  el.innerHTML=icon?`<span style="color:${color};font-size:11px">${icon}</span>`:'';
}
async function pushToSB(){
  setSyncStatus('saving');
  try{
    const res=await fetch(`${SB_URL}/rest/v1/app_state`,{
      method:'POST',headers:SB_HEADERS,
      body:JSON.stringify({id:SUPABASE_ROW,data:state,updated_at:new Date().toISOString()})
    });
    if(!res.ok)throw new Error(res.status);
    setSyncStatus('ok');setTimeout(()=>setSyncStatus('idle'),2500);
  }catch(e){setSyncStatus(navigator.onLine?'err':'offline');}
}
async function pullFromSB(){
  try{
    const res=await fetch(`${SB_URL}/rest/v1/app_state?id=eq.${SUPABASE_ROW}&select=data`,{
      headers:{...SB_HEADERS,'Accept':'application/json'}
    });
    if(!res.ok)throw new Error(res.status);
    const rows=await res.json();
    if(rows&&rows.length&&rows[0].data&&Object.keys(rows[0].data).length){
      state=rows[0].data;
      localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
      return true;
    }
  }catch(e){setSyncStatus(navigator.onLine?'err':'offline');}
  return false;
}
function schedulePush(){clearTimeout(_syncTimer);_syncTimer=setTimeout(pushToSB,1200);}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));document.body.setAttribute('data-theme',state.theme);schedulePush();}
function saveAndRender(){save();renderView();}

/* ── Helpers ── */
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function dateKey(d){return d.toISOString().slice(0,10);}
function todayKey(){return dateKey(new Date());}
function getDay(key){
  if(!state.calendar)state.calendar={};
  if(!state.calendar[key])state.calendar[key]={note:'',items:[],drinks:[]};
  if(!state.calendar[key].drinks)state.calendar[key].drinks=[];
  return state.calendar[key];
}
function toggleTheme(){state.theme=state.theme==='dark'?'light':'dark';save();document.body.setAttribute('data-theme',state.theme);}
function setView(v){
  currentView=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+v)?.classList.add('active');
  renderView();
}

/* ── Startup checks ── */
function runStartupChecks(){
  if(!state.calRecurring)state.calRecurring=[];
  const today=new Date();
  const todayStr=todayKey();
  const calDay=getDay(todayStr);
  state.calRecurring.forEach(cr=>{
    if(!cr.period||cr.period==='none')return;
    if(!shouldReset(cr,today))return;
    const existing=calDay.items.find(x=>x._crId===cr.id);
    if(!existing)calDay.items.push({text:cr.text,done:false,_crId:cr.id});
    else if(existing.done&&cr.lastDoneDate&&cr.lastDoneDate!==todayStr)existing.done=false;
  });
  state.lastResetDate=todayStr;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}
function shouldReset(cr,today){
  const dow=today.getDay(),date=today.getDate();
  if(cr.period==='daily')return true;
  if(cr.period==='weekly'){const days=Array.isArray(cr.periodValue)?cr.periodValue:[];return days.includes(dow);}
  if(cr.period==='monthly'){
    const pv=cr.periodValue;
    if(pv==='last'){const ld=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();return date===ld;}
    return date===parseInt(pv)||false;
  }
  return false;
}

/* ── Period label ── */
function periodLabel(cr){
  if(cr.period==='daily')return'每日';
  if(cr.period==='weekly'){const names=['日','一','二','三','四','五','六'];const days=Array.isArray(cr.periodValue)?cr.periodValue:[];return'每週 '+(days.map(d=>names[d]).join('/')||'—');}
  if(cr.period==='monthly'){const pv=cr.periodValue;if(pv==='last')return'每月底';if(pv==='1')return'每月初';return`每月${pv}日`;}
  return'';
}

/* ── Calendar grid ── */
function buildMonthGrid(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  const today=todayKey();
  const first=new Date(y,m,1);
  const startDow=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  let cells='';
  const totalCells=Math.ceil((startDow+daysInMonth)/7)*7;
  cells+=DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<totalCells;i++){
    const offset=i-startDow;
    const d=new Date(y,m,1+offset);
    const key=dateKey(d);
    const isThisMonth=d.getMonth()===m;
    const day=getDay(key);
    const checks=day.items||[];
    const drinks=day.drinks||[];
    const drinkTotal=drinks.reduce((s,d)=>s+(parseFloat(d.price)||0),0);
    const cls=['cal-cell',!isThisMonth?'other-month':'',key===today?'today':'',key===calSelected?'selected':''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}" onclick="selectDay('${key}')">
      <div class="cal-date">${d.getDate()}</div>
      ${drinks.length?`<div class="cal-drink-chip">🧋${drinks.length>1?' ×'+drinks.length:''} ${drinkTotal?'$'+drinkTotal:''}</div>`:''}
      ${checks.length?`<div class="cal-dots">${checks.map(x=>`<div class="cal-dot${x.done?' done':''}"></div>`).join('')}</div>`:''}
    </div>`;
  }
  return`<div class="cal-grid">${cells}</div>`;
}

function buildWeekGrid(){
  const d=new Date(calDate);
  d.setDate(d.getDate()-d.getDay());
  const today=todayKey();
  let cells='';
  for(let i=0;i<7;i++){
    const key=dateKey(d);
    const day=getDay(key);
    const isWknd=[0,6].includes(d.getDay());
    const cls=['week-cell',isWknd?'weekend-bg':'',key===today?'today':'',key===calSelected?'selected':''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}" onclick="selectDay('${key}')">
      <div class="week-dow">${DOW[d.getDay()]}</div>
      <div class="week-date">${d.getDate()}</div>
      ${day.note?`<div class="week-note">${esc(day.note.slice(0,60))}</div>`:''}
      ${day.drinks?.length?`<div style="font-size:10px;color:var(--amb);margin-top:4px">🧋 $${day.drinks.reduce((s,d)=>s+(parseFloat(d.price)||0),0)}</div>`:''}
    </div>`;
    d.setDate(d.getDate()+1);
  }
  return`<div class="week-grid">${cells}</div>`;
}

function selectDay(key){calSelected=key;renderView();}

/* ── Day Panel ── */
function buildDayPanel(){
  if(!calSelected)return'';
  const day=getDay(calSelected);
  const d=new Date(calSelected+'T12:00:00');
  const isWknd=[0,6].includes(d.getDay());
  const dateStr=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）${isWknd?' 🌿':''}`;
  const items=day.items||[];

  const checkHtml=items.map((item,i)=>{
    const isCr=!!item._crId;
    const cr=isCr?state.calRecurring?.find(x=>x.id===item._crId):null;
    return`<div class="checklist-item">
      <div class="cl-check${item.done?' checked':''}" onclick="toggleCheck('${calSelected}',${i})"></div>
      <input class="cl-text${item.done?' done-text':''}" value="${esc(item.text)}"
        oninput="updateCheckText('${calSelected}',${i},this.value)"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addCheck('${calSelected}');}">
      ${isCr&&cr?`<span class="cr-tag">🔄 ${periodLabel(cr)}</span>`:''}
      ${!isCr?`<button class="cl-del" onclick="deleteCheck('${calSelected}',${i})">×</button>`:''}
    </div>`;
  }).join('');

  return`<div class="panel-wrap">
    <div class="panel-header">
      <div class="panel-date">${dateStr}</div>
      <button class="panel-close" onclick="calSelected=null;renderView()">×</button>
    </div>
    <div class="panel-body">
      <div class="panel-label">備註</div>
      <textarea class="day-note" oninput="updateNote('${calSelected}',this.value)" placeholder="今天的計劃、備忘...">${esc(day.note||'')}</textarea>

      <div class="panel-label">Checklist</div>
      <div id="cl-${calSelected}">${checkHtml}</div>
      <button class="add-cl-btn" onclick="addCheck('${calSelected}')">+ 新增項目</button>

      <div class="rule-toggle" onclick="toggleCrManager()">🔄 週期 Checklist <span id="cr-arrow">▸</span>
        ${(state.calRecurring?.length||0)?`<span style="font-size:10px;color:var(--amb);margin-left:4px">${state.calRecurring.length} 個</span>`:''}
      </div>
      <div id="cr-wrap" style="display:none">
        <div id="cr-manager"></div>
        <button class="add-cl-btn" style="margin-top:4px" onclick="addCrItem()">+ 新增週期項目</button>
      </div>

      <div class="panel-label" style="margin-top:14px">🧋 今日飲料</div>
      <div style="font-size:10px;color:var(--tx2);display:grid;grid-template-columns:1fr 1fr 60px 18px;gap:0 6px;padding:0 0 4px;border-bottom:1px solid var(--bd);margin-bottom:2px">
        <span>飲料</span><span>店家</span><span style="text-align:right">金額</span><span></span>
      </div>
      <div id="drink-list-${calSelected}"></div>
      <div id="drink-total-${calSelected}" class="drink-total"></div>
      <button class="add-cl-btn" style="margin-top:6px" onclick="addDrink('${calSelected}')">+ 新增飲料</button>
    </div>
  </div>`;
}

/* ── Checklist functions ── */
function updateNote(key,val){getDay(key).note=val;save();}
function toggleCheck(key,i){
  const day=getDay(key);
  day.items[i].done=!day.items[i].done;
  const crId=day.items[i]._crId;
  if(crId&&day.items[i].done){const cr=state.calRecurring?.find(x=>x.id===crId);if(cr)cr.lastDoneDate=key;}
  save();renderView();
}
function updateCheckText(key,i,val){getDay(key).items[i].text=val;save();}
function addCheck(key){
  getDay(key).items.push({text:'',done:false});save();renderView();
  setTimeout(()=>{const inputs=document.querySelectorAll(`#cl-${key} .cl-text`);if(inputs.length)inputs[inputs.length-1].focus();},30);
}
function deleteCheck(key,i){getDay(key).items.splice(i,1);save();renderView();}

/* ── Recurring checklist ── */
function toggleCrManager(){
  const wrap=document.getElementById('cr-wrap');
  const arrow=document.getElementById('cr-arrow');
  if(!wrap)return;
  const open=wrap.style.display==='none';
  wrap.style.display=open?'block':'none';
  if(arrow)arrow.textContent=open?'▾':'▸';
  if(open)renderCrManager();
}
function addCrItem(){
  const text=prompt('週期項目名稱：');if(!text?.trim())return;
  if(!state.calRecurring)state.calRecurring=[];
  state.calRecurring.push({id:'cr'+Date.now(),text:text.trim(),period:'daily',periodValue:null,lastDoneDate:null});
  save();
  runStartupChecks();renderView();
}
function deleteCrItem(id){
  if(!confirm('確定刪除？'))return;
  state.calRecurring=state.calRecurring.filter(x=>x.id!==id);
  Object.values(state.calendar||{}).forEach(day=>{if(day.items)day.items=day.items.filter(x=>x._crId!==id);});
  save();renderCrManager();
}
function updateCrPeriod(id,period){
  const cr=state.calRecurring?.find(x=>x.id===id);if(!cr)return;
  cr.period=period;cr.periodValue=period==='weekly'?[1]:period==='monthly'?'1':null;
  save();renderCrManager();
}
function updateCrDow(id,dow,checked){
  const cr=state.calRecurring?.find(x=>x.id===id);if(!cr)return;
  if(!Array.isArray(cr.periodValue))cr.periodValue=[];
  if(checked){if(!cr.periodValue.includes(dow))cr.periodValue.push(dow);}
  else cr.periodValue=cr.periodValue.filter(d=>d!==dow);
  save();
}
function updateCrMonthday(id,val){const cr=state.calRecurring?.find(x=>x.id===id);if(cr){cr.periodValue=val;save();}}
function renderCrManager(){
  const container=document.getElementById('cr-manager');if(!container)return;
  const list=state.calRecurring||[];
  const DOW_N=['日','一','二','三','四','五','六'];
  const monthOpts=`<option value="1">月初(1日)</option><option value="last">月底</option>${Array.from({length:28},(_,i)=>`<option value="${i+2}">${i+2}日</option>`).join('')}`;
  container.innerHTML=list.length?list.map(cr=>`
    <div class="cr-manager-item">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="flex:1;font-size:13px;font-weight:500">${esc(cr.text)}</span>
        <span class="cr-period-label">${periodLabel(cr)}</span>
        <button style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px" onclick="deleteCrItem('${cr.id}')">×</button>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <select style="margin:0;font-size:11px;padding:4px 8px;width:auto;background:var(--bg);border:1px solid var(--bd);color:var(--tx);border-radius:6px" onchange="updateCrPeriod('${cr.id}',this.value)">
          <option value="daily" ${cr.period==='daily'?'selected':''}>每日</option>
          <option value="weekly" ${cr.period==='weekly'?'selected':''}>每週</option>
          <option value="monthly" ${cr.period==='monthly'?'selected':''}>每月</option>
        </select>
        ${cr.period==='weekly'?`<div style="display:flex;gap:4px;flex-wrap:wrap">${DOW_N.map((n,i)=>`
          <label style="display:flex;align-items:center;gap:2px;font-size:11px;cursor:pointer">
            <input type="checkbox" style="width:auto;margin:0" ${Array.isArray(cr.periodValue)&&cr.periodValue.includes(i)?'checked':''}
              onchange="updateCrDow('${cr.id}',${i},this.checked)"> ${n}
          </label>`).join('')}</div>`:''}
        ${cr.period==='monthly'?`<select style="margin:0;font-size:11px;padding:4px 8px;width:auto;background:var(--bg);border:1px solid var(--bd);color:var(--tx);border-radius:6px" onchange="updateCrMonthday('${cr.id}',this.value)">
          ${monthOpts.replace(`value="${cr.periodValue||'1'}"`,`value="${cr.periodValue||'1'}" selected`)}</select>`:''}
      </div>
    </div>`).join('')
  :`<div style="font-size:12px;color:var(--tx2);padding:8px 0">尚無週期項目</div>`;
}

/* ── Drink tracker ── */
function getDrinkMemory(){
  const mem={};
  Object.values(state.calendar||{}).forEach(day=>{
    (day.drinks||[]).forEach(d=>{
      if(!d.name)return;
      const k=d.name.toLowerCase().trim();
      if(!mem[k])mem[k]={name:d.name,shop:d.shop||'',price:d.price||'',count:0};
      mem[k].count++;
      if(d.price)mem[k].price=d.price;
      if(d.shop)mem[k].shop=d.shop;
    });
  });
  return Object.values(mem).sort((a,b)=>b.count-a.count);
}
function getShopMemory(){
  const shops=new Set();
  Object.values(state.calendar||{}).forEach(day=>{(day.drinks||[]).forEach(d=>{if(d.shop)shops.add(d.shop.trim());});});
  return[...shops];
}
function addDrink(key){
  getDay(key).drinks.push({name:'',shop:'',price:''});save();
  renderDrinkList(key);
  setTimeout(()=>{const rows=document.querySelectorAll(`#drink-list-${key} .drink-name .drink-input`);if(rows.length)rows[rows.length-1].focus();},30);
}
function updateDrink(key,i,field,val){const d=getDay(key).drinks;if(d[i])d[i][field]=val;save();renderDrinkTotal(key);}
function deleteDrink(key,i){getDay(key).drinks.splice(i,1);save();renderDrinkList(key);}
function renderDrinkTotal(key){
  const drinks=getDay(key).drinks;
  const total=drinks.reduce((s,d)=>s+(parseFloat(d.price)||0),0);
  const el=document.getElementById(`drink-total-${key}`);
  if(el)el.innerHTML=drinks.length?`今日飲料支出：<span>NT$ ${total}</span>`:'';
}
function showDrinkAc(dropId,items){
  const drop=document.getElementById(dropId);if(!drop)return;
  if(!items.length){drop.style.display='none';return;}
  drop.innerHTML=items.map(x=>`<div class="drink-ac-item"><span class="drink-ac-name">${esc(x.name||x)}</span>${x.shop||x.price?`<span class="drink-ac-sub">${[x.shop,x.price?'NT$'+x.price:''].filter(Boolean).join(' · ')}</span>`:''}</div>`).join('');
  drop.style.display='block';
}
function hideDrop(id){setTimeout(()=>{const d=document.getElementById(id);if(d)d.style.display='none';},150);}
function renderDrinkList(key){
  const drinks=getDay(key).drinks;
  const list=document.getElementById(`drink-list-${key}`);if(!list)return;
  list.innerHTML=drinks.map((d,i)=>{
    const nd=`dnd-${key}-${i}`,sd=`dsd-${key}-${i}`;
    return`<div class="drink-row">
      <span style="font-size:14px;flex-shrink:0">🧋</span>
      <div class="drink-name">
        <input class="drink-input" value="${esc(d.name)}" placeholder="飲料名稱" autocomplete="off"
          oninput="updateDrink('${key}',${i},'name',this.value);drinkNameAc('${key}',${i},this.value,'${nd}')"
          onfocus="drinkNameAc('${key}',${i},this.value,'${nd}')" onblur="hideDrop('${nd}')">
        <div class="drink-ac-drop" id="${nd}" style="display:none" onmousedown="event.preventDefault()"></div>
      </div>
      <div class="drink-shop">
        <input class="drink-input" value="${esc(d.shop)}" placeholder="店家" autocomplete="off"
          oninput="updateDrink('${key}',${i},'shop',this.value);drinkShopAc('${key}',${i},this.value,'${sd}')"
          onfocus="drinkShopAc('${key}',${i},this.value,'${sd}')" onblur="hideDrop('${sd}')">
        <div class="drink-ac-drop" id="${sd}" style="display:none" onmousedown="event.preventDefault()"></div>
      </div>
      <div class="drink-price">
        <input class="drink-input" value="${esc(d.price)}" placeholder="$" type="number" min="0"
          oninput="updateDrink('${key}',${i},'price',this.value)" style="text-align:right">
      </div>
      <button class="drink-del" onclick="deleteDrink('${key}',${i})">×</button>
    </div>`;
  }).join('');
  renderDrinkTotal(key);
  // wire ac clicks
  drinks.forEach((d,i)=>{
    const nd=`dnd-${key}-${i}`,sd=`dsd-${key}-${i}`;
    const mem=getDrinkMemory();const shops=getShopMemory();
    const lqn=(d.name||'').toLowerCase();const lqs=(d.shop||'').toLowerCase();
    const nameHits=lqn?mem.filter(m=>m.name.toLowerCase().includes(lqn)):mem.slice(0,6);
    const shopHits=lqs?shops.filter(s=>s.toLowerCase().includes(lqs)).map(s=>({name:s})):shops.slice(0,6).map(s=>({name:s}));
    document.getElementById(nd)?.querySelectorAll('.drink-ac-item').forEach((el,j)=>{
      if(nameHits[j])el.onclick=()=>{const h=nameHits[j];const dr=getDay(key).drinks[i];if(dr){dr.name=h.name;if(h.shop)dr.shop=h.shop;if(h.price)dr.price=h.price;}save();renderDrinkList(key);};
    });
    document.getElementById(sd)?.querySelectorAll('.drink-ac-item').forEach((el,j)=>{
      if(shopHits[j])el.onclick=()=>{updateDrink(key,i,'shop',shopHits[j].name);renderDrinkList(key);};
    });
  });
}
function drinkNameAc(key,i,val,dropId){
  const mem=getDrinkMemory();const lq=val.toLowerCase();
  showDrinkAc(dropId,lq?mem.filter(m=>m.name.toLowerCase().includes(lq)):mem.slice(0,6));
}
function drinkShopAc(key,i,val,dropId){
  const shops=getShopMemory().map(s=>({name:s}));const lq=val.toLowerCase();
  showDrinkAc(dropId,lq?shops.filter(s=>s.name.toLowerCase().includes(lq)):shops.slice(0,6));
}

/* ── Drink Stats view ── */
function renderDrinkStats(content){
  const allDrinks=[];
  Object.entries(state.calendar||{}).forEach(([key,day])=>{
    (day.drinks||[]).forEach(d=>{if(d.name||d.price)allDrinks.push({...d,date:key});});
  });
  allDrinks.sort((a,b)=>b.date.localeCompare(a.date));
  const total=allDrinks.reduce((s,d)=>s+(parseFloat(d.price)||0),0);
  const thisMonth=new Date().toISOString().slice(0,7);
  const monthTotal=allDrinks.filter(d=>d.date.startsWith(thisMonth)).reduce((s,d)=>s+(parseFloat(d.price)||0),0);
  const rows=allDrinks.slice(0,50).map(d=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px">
      <div>
        <div style="font-weight:500">${esc(d.name)||'—'} ${d.shop?`<span style="font-size:11px;color:var(--tx2)">· ${esc(d.shop)}</span>`:''}
        </div>
        <div style="font-size:11px;color:var(--tx2)">${d.date}</div>
      </div>
      <div style="color:var(--amb);font-weight:600">${d.price?'NT$'+d.price:''}</div>
    </div>`).join('');
  content.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div style="background:var(--surf);border:1px solid var(--bd);border-radius:10px;padding:14px">
        <div style="font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">本月支出</div>
        <div style="font-size:24px;font-weight:600;color:var(--amb)">NT$ ${monthTotal}</div>
      </div>
      <div style="background:var(--surf);border:1px solid var(--bd);border-radius:10px;padding:14px">
        <div style="font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">累計支出</div>
        <div style="font-size:24px;font-weight:600;color:var(--tx)">${total?'NT$ '+total:'—'}</div>
      </div>
    </div>
    <div style="background:var(--surf);border:1px solid var(--bd);border-radius:10px;padding:14px">
      <div style="font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">飲料記錄</div>
      ${rows||'<div style="color:var(--tx2);font-size:13px;padding:12px 0">還沒有記錄</div>'}
    </div>`;
}

/* ── Settings view ── */
function renderSettings(content){
  content.innerHTML=`
    <div style="background:var(--surf);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">外觀</div>
      <button onclick="toggleTheme()" style="background:var(--surf2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer;font-family:'Geist',sans-serif;width:100%">
        🌓 切換深色 / 淺色模式
      </button>
    </div>
    <div style="background:var(--surf);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">同步</div>
      <button onclick="forcePush()" style="background:var(--surf2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer;font-family:'Geist',sans-serif;width:100%">
        ⬆ 立即同步到雲端
      </button>
    </div>
    <div style="font-size:11px;color:var(--tx2);text-align:center;padding:8px">
      行事曆版 · 資料透過 Supabase 同步
    </div>`;
}
function forcePush(){setSyncStatus('saving');pushToSB();}

/* ── Tab bar auto-hide ── */
(function(){
  let lastY=0;
  setTimeout(()=>{
    const ca=document.getElementById('content');
    if(!ca)return;
    ca.addEventListener('scroll',()=>{
      const tb=document.getElementById('tabbar');if(!tb)return;
      const y=ca.scrollTop;
      tb.classList.toggle('hidden',y>lastY&&y>60);
      lastY=y;
    },{passive:true});
  },500);
})();

/* ── Nav calendar ── */
function calNav(dir){
  if(calView==='month'){calDate=new Date(calDate.getFullYear(),calDate.getMonth()+dir,1);}
  else{calDate=new Date(calDate.getTime()+dir*7*86400000);}
  renderView();
}
function calGoToday(){calDate=new Date();calSelected=todayKey();renderView();}

/* ── Main render ── */
function renderView(){
  const content=document.getElementById('content');
  const title=document.getElementById('h-title');
  const isWknd=[0,6].includes(new Date().getDay());
  content.classList.toggle('weekend-bg',isWknd&&currentView==='cal');

  if(currentView==='stats'){title.textContent='🧋 飲料統計';renderDrinkStats(content);return;}
  if(currentView==='settings'){title.textContent='設定';renderSettings(content);return;}

  // Calendar view
  const y=calDate.getFullYear(),m=calDate.getMonth();
  let titleStr=calView==='month'?`${y}年 ${MONTHS[m]}`:(()=>{
    const wd=new Date(calDate);wd.setDate(wd.getDate()-wd.getDay());
    const we=new Date(wd.getTime()+6*86400000);
    return`${wd.getMonth()+1}/${wd.getDate()} – ${we.getMonth()+1}/${we.getDate()}`;
  })();
  title.textContent=titleStr;

  const grid=calView==='month'?buildMonthGrid():buildWeekGrid();
  const panel=buildDayPanel();

  content.innerHTML=`
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <button class="cal-nav" onclick="calGoToday()">今天</button>
      <button class="cal-nav" onclick="calNav(1)">›</button>
      <div class="cal-month-title">${titleStr}</div>
      <div class="cal-view-toggle">
        <button class="cal-view-btn${calView==='month'?' active':''}" onclick="calView='month';renderView()">月</button>
        <button class="cal-view-btn${calView==='week'?' active':''}" onclick="calView='week';renderView()">週</button>
      </div>
    </div>
    ${grid}
    ${panel}`;

  if(calSelected)setTimeout(()=>{
    renderDrinkList(calSelected);
    const wrap=document.getElementById('cr-wrap');
    if(wrap&&wrap.style.display!=='none')renderCrManager();
  },10);
}

/* ── Boot ── */
async function boot(){
  setSyncStatus('saving');
  const pulled=await pullFromSB();
  setSyncStatus(pulled?'ok':'offline');
  setTimeout(()=>setSyncStatus('idle'),2500);
  runStartupChecks();
  document.body.setAttribute('data-theme',state.theme||'dark');
  renderView();
}

// Check if already unlocked
if(localStorage.getItem('cal_unlocked')==='1'){
  document.getElementById('lock-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('tabbar').style.display='flex';
  boot();
} else {
  document.getElementById('tabbar').style.display='none';
  document.getElementById('lock-input').focus();
}

window.addEventListener('online',()=>schedulePush());
window.addEventListener('offline',()=>setSyncStatus('offline'));
</script>
